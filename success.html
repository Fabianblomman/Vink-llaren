<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Betalning lyckades – Vinkällaren</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
  :root { --bg:#0d0a08;--gold:#c9a84c;--gold-light:#e8c96d;--cream:#f5ede0;--wine:#8b1a2e;--wine-light:#c4314f;--muted:#8a7568;--surface:#1a1410;--border:#3d2e22; }
  * { margin:0;padding:0;box-sizing:border-box; }
  body { background:var(--bg);color:var(--cream);font-family:'Cormorant Garamond',serif;min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:2rem; }
  .box { max-width:480px; }
  .icon { font-size:5rem;margin-bottom:1.5rem;animation:pop 0.6s ease; }
  @keyframes pop { 0%{transform:scale(0)}60%{transform:scale(1.15)}100%{transform:scale(1)} }
  h1 { font-family:'Playfair Display',serif;font-size:2.4rem;font-weight:400;background:linear-gradient(135deg,var(--cream),var(--gold-light));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:1rem; }
  p { color:var(--muted);font-size:1.1rem;line-height:1.8;margin-bottom:2rem;font-style:italic; }
  a { display:inline-block;background:linear-gradient(135deg,var(--wine),var(--wine-light));color:var(--cream);text-decoration:none;padding:0.9rem 2.5rem;font-family:'Cormorant Garamond',serif;font-size:1.1rem;letter-spacing:0.12em;text-transform:uppercase;border-radius:2px;transition:all 0.3s; }
  a:hover { transform:translateY(-2px);box-shadow:0 8px 30px rgba(139,26,46,0.4); }
  .ornament { color:var(--gold);letter-spacing:0.4em;opacity:0.5;margin-bottom:1rem;font-size:1.2rem; }
</style>
</head>
<body>
<div class="box">
  <div class="ornament">✦ ✦ ✦</div>
  <div class="icon">🍾</div>
  <h1>Välkommen!</h1>
  <p>Din betalning är bekräftad och ditt konto är nu aktiverat.<br>Det är dags att bygga din vinkällare.</p>
  <a href="index.html?session_id=SUCCESS_PLACEHOLDER">Gå till Vinkällaren →</a>
</div>
<script>
  // Vidarebefordra session_id från URL till index.html för verifiering
  const params = new URLSearchParams(window.location.search);
  const sessionId = params.get('session_id');
  if (sessionId) {
    document.querySelector('a').href = `index.html?session_id=${sessionId}`;
  } else {
    document.querySelector('a').href = 'index.html';
  }
</script>
</body>
</html>
